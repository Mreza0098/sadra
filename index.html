<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدرا</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: Tahoma; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #222; padding: 40px; border-radius: 20px; border-right: 4px solid #8B0000; max-width: 400px; width: 100%; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 10px; border: 1px solid #444; background: #1a1a1a; color: #fff; }
        button { background: #8B0000; cursor: pointer; font-weight: bold; }
        button:hover { background: #a00000; }
        h2 { text-align: center; color: #8B0000; }
    </style>
</head>
<body>
<div class="box">
    <h2>★ صدرا ★</h2>
    <p style="text-align:center; color:#aaa;">نسخه‌ی جدید در حال آپدیت...</p>
    <hr style="border-color:#333; margin:20px 0;">
    <p style="text-align:center; color:#aaa;">لطفاً چند دقیقه دیگر مجدد تلاش کنید.</p>
</div>
</body>
</html>
